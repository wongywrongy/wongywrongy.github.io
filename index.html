<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Physics Units</title>
    <style>
        /* Global styles */
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #444;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2em;
        }

        main {
            width: 80%;
            margin: 20px auto;
        }

        section {
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.2s ease-in-out;
        }

        section:hover {
            transform: scale(1.05);
        }

        section h2 {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: #333;
            cursor: pointer;
        }

        ul {
            display: none;
            list-style: none;
            padding-left: 20px;
        }

        ul li {
            margin-bottom: 5px;
            cursor: pointer;
        }

        /* Responsive styles */
        @media (max-width: 768px) {
            main {
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Physics Units</h1>
    </header>
    <main>
        <section id="unit1">
            <h2 onclick="toggleUnits('unit1Inner')">Unit 1: Fluids: Pressure and Forces</h2>
            <ul id="unit1Inner">
                <li>Fluid Systems</li>
                <li>Density</li>
                <li>Pressure and Forces</li>
                <li>Fluids and Free-Body Diagrams</li>
                <li>Buoyancy</li>
                <li>Conservation of Energy in Fluid Flow</li>
                <li>Conservation of Mass Flow Rate in Fluids</li>
            </ul>
        </section>
        
        <!-- ... (other sections) ... -->

    </main>
    <footer>
        <p>&copy; 2023 Your Name</p>
    </footer>

    <script>
        function toggleUnits(id) {
            const innerList = document.getElementById(id);
            innerList.style.display = innerList.style.display === 'none' ? 'block' : 'none';
        }
    </script>
</body>
</html>
